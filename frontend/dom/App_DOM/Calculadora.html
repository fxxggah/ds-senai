<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
            background-color: rgba(28, 139, 172, 0.229);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .calc{
            background: rgba(38, 144, 54, 0.305);
            padding: 20px;
            margin: 5px;
            font-size: 1em;
            text-align: center;
        }

        .calc button{
            padding: 8px 12px;
            margin: 5px;
            cursor: pointer;
        }

        #resultado{
            margin-top: 15px;
            font-size: 1.4em;
            min-height: 1.4em;
        }

    </style>
</head>
<body>
    <div class="calc">
        <h2>Calculadora</h2>
        <div>
            <input id="n1" type="number">
            <input id="n2" type="number">
        </div>
        <div>
            <button id="somar">+</button>
            <button id="subtrair">-</button>
            <button id="multiplicar">*</button>
            <button id="dividir">/</button>
        </div>
        <div id="resultado"></div>
    </div>

    <script>
        var n1 = document.getElementById("n1")
        var n2 = document.getElementById("n2")
        var res = document.getElementById("resultado")

        function somar(){
            res.innerText= Number(n1.value)+Number(n2.value)
        }

        function subtrair(){
            res.innerText= Number(n1.value)-Number(n2.value)
        }

        function multiplicar(){
            res.innerText= Number(n1.value)*Number(n2.value)
        }

        function dividir(){
            res.innerText= Number(n1.value)/Number(n2.value||1)
        }

        document.getElementById("somar").addEventListener("click", somar)
        document.getElementById("subtrair").addEventListener("click", subtrair)
        document.getElementById("multiplicar").addEventListener("click", multiplicar)
        document.getElementById("dividir").addEventListener("click", dividir)
        
    </script>
</body>
</html>
