<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Papyro - Editar cliente</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-gray-50 flex min-h-screen text-gray-900">

    <aside class="w-72 bg-white border-r border-gray-200 flex flex-col shrink-0">
        <div class="p-8"><h1 class="text-2xl font-black tracking-tighter text-black uppercase">Papyro</h1></div>
        <nav class="flex-1 px-4 space-y-1">
            <a href="/" class="flex items-center gap-3 px-4 py-3 text-sm font-medium text-gray-600 hover:bg-gray-50 rounded-xl transition-all">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
                Início
            </a>
            
            <div class="pt-6 pb-2 text-[11px] font-bold text-gray-400 uppercase tracking-[0.15em] pl-4">Acervo e clientes</div>
            <a href="/cadastrar-produto" class="flex items-center gap-3 px-4 py-3 text-sm font-medium text-gray-600 hover:bg-gray-50 rounded-xl transition-all">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"/></svg>
                Cadastrar produto
            </a>
            <a href="/listar-produto" class="flex items-center gap-3 px-4 py-3 text-sm font-medium text-gray-600 hover:bg-gray-50 rounded-xl transition-all">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg>
                Listar produtos
            </a>
            <a href="/cadastrar-cliente" class="flex items-center gap-3 px-4 py-3 text-sm font-medium text-gray-600 hover:bg-gray-50 rounded-xl transition-all">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"/></svg>
                Cadastrar cliente
            </a>
            <a href="/listar-cliente" class="flex items-center gap-3 px-4 py-3 text-sm font-semibold bg-black text-white rounded-xl shadow-md transition-all">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
                Listar clientes
            </a>

            <div class="pt-6 pb-2 text-[11px] font-bold text-gray-400 uppercase tracking-[0.15em] pl-4">Operações</div>
            <a href="/realizar-emprestimo" class="flex items-center gap-3 px-4 py-3 text-sm font-medium text-gray-600 hover:bg-gray-50 rounded-xl transition-all">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"/></svg>
                Empréstimos
            </a>
        </nav>
    </aside>

    <main class="flex-1 p-12 overflow-y-auto">
        <div class="max-w-xl mx-auto">
            <header class="mb-10">
                <h2 class="text-3xl font-extrabold text-gray-900 tracking-tight">Editar cliente</h2>
                <p class="text-gray-500 mt-2 text-lg">Altere as informações do cliente selecionado abaixo.</p>
            </header>

            <form action="/editar-cliente" method="post" class="bg-white border border-gray-200 rounded-3xl p-10 shadow-sm">
                <div class="space-y-6">
                    <div>
                        <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-2">CPF (Identificador)</label>
                        <input type="text" name="cpf" value="{{ cliente[0] }}" readonly class="w-full px-4 py-3 bg-gray-100 border border-gray-200 rounded-xl text-gray-500 cursor-not-allowed outline-none">
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-2">Nome Completo</label>
                        <input type="text" name="nome" value="{{ cliente[1] }}" required class="w-full px-4 py-3 bg-white border border-gray-300 rounded-xl focus:ring-2 focus:ring-black outline-none transition-all">
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-2">Endereço</label>
                        <input type="text" name="endereco" value="{{ cliente[2] }}" required class="w-full px-4 py-3 bg-white border border-gray-300 rounded-xl focus:ring-2 focus:ring-black outline-none transition-all">
                    </div>

                    <div class="grid grid-cols-2 gap-6">
                        <div>
                            <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-2">Telefone</label>
                            <input type="text" name="telefone" value="{{ cliente[3] }}" required class="w-full px-4 py-3 bg-white border border-gray-300 rounded-xl focus:ring-2 focus:ring-black outline-none transition-all">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-2">E-mail</label>
                            <input type="email" name="email" value="{{ cliente[4] }}" required class="w-full px-4 py-3 bg-white border border-gray-300 rounded-xl focus:ring-2 focus:ring-black outline-none transition-all">
                        </div>
                    </div>
                </div>

                <div class="mt-10 pt-8 border-t border-gray-100 flex justify-end gap-4">
                    <a href="/listar-cliente" class="px-6 py-3.5 text-sm font-bold text-gray-500 hover:text-black transition-colors">Voltar</a>
                    <button type="submit" class="bg-black text-white px-10 py-3.5 rounded-xl font-bold hover:scale-[1.02] active:scale-[0.98] transition-all shadow-lg">
                        Salvar Alterações
                    </button>
                </div>
            </form>
        </div>
    </main>
</body>
</html>
