<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Aluno</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container form-card">
    <h1>Editar Aluno</h1>

    <form action="{{ url_for('edit', id=student.id) }}" method="post">
        <label for="name">Nome</label>
        <input type="text" name="name" id="name" value="{{ student.name }}" required>

        <label for="dob">Data de Nascimento</label>
        <input type="date" name="dob" id="dob" value="{{ student.dob }}" required>

        <label for="address">Endereço</label>
        <input type="text" name="address" id="address" value="{{ student.address }}" required>

        <label for="class">Turma</label>
        <input type="text" name="class" id="class" value="{{ student.class }}" required>

        <button type="submit" class="btn btn-save">
            Atualizar Aluno
        </button>
    </form>
</div>

</body>
</html>
