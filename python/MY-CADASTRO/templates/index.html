<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Alunos</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">
    <h1>📚 Sistema de Cadastro de Alunos</h1>

    <a href="{{ url_for('add') }}" class="btn btn-add">
        + Adicionar Novo Aluno
    </a>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Nome</th>
                <th>Nascimento</th>
                <th>Endereço</th>
                <th>Turma</th>
                <th>Ações</th>
            </tr>
        </thead>
        <tbody>
            {% for student in students %}
            <tr>
                <td>{{ student.id }}</td>
                <td>{{ student.name }}</td>
                <td>{{ student.dob }}</td>
                <td>{{ student.address }}</td>
                <td>{{ student.class }}</td>
                <td>
                    <div class="actions">
                        <a href="{{ url_for('edit', id=student.id) }}" class="btn btn-edit">
                            Editar
                        </a>

                        <form action="{{ url_for('delete', id=student.id) }}" method="post">
                            <button type="submit" class="btn btn-delete">
                                Deletar
                            </button>
                        </form>
                    </div>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>

</body>
</html>
