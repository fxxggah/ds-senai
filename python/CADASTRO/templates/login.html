<!doctype html>
<html lang="pt-br">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login | Projeto Flask</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-4bw+/aepP/YC94hEpVNVgiZdgIC5+VKNBQNGCHeKRQN+PtmoHDEXuppvnDJzQIu9" crossorigin="anonymous">
    
    <style>
        /* Ajuste simples para centralizar o card verticalmente */
        body { background-color: #f8f9fa; }
        .main-container { min-height: 80vh; display: flex; align-items: center; }
    </style>
</head>

<body>

    <header>
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
            <div class="container">
                <a class="navbar-brand fw-bold" href="/">PROJETO FLASK</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item">
                            <a class="nav-link" href="/usuario">Cadastro</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link active" href="/login">Login</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <main class="container main-container">
        <section class="row justify-content-center w-100">
            <div class="col-md-6 col-lg-4">
                
                <div class="card border-0 shadow-lg">
                    
                    <div class="card-header bg-danger text-white text-center py-3">
                        <h4 class="mb-0 text-uppercase" style="letter-spacing: 1px;">Acesse sua Conta</h4>
                    </div>

                    <div class="card-body p-4">
                        
                        {% set aviso = get_flashed_messages() %}
                        {% if aviso %}
                        <div class="alert alert-warning py-2 text-center" role="alert">
                            <small>{{ aviso[0] }}</small>
                        </div>
                        {% endif %}

                        <form id="login" action="/validar-login" method="post">
                            <div class="mb-3">
                                <label for="cpf" class="form-label fw-semibold">CPF</label>
                                <input type="text" class="form-control form-control-lg" id="cpf" name="cpf" placeholder="000.000.000-00">
                            </div>

                            <div class="mb-4">
                                <label for="senha" class="form-label fw-semibold">Senha</label>
                                <input type="password" class="form-control form-control-lg" id="senha" name="senha" placeholder="********">
                            </div>

                            <div class="d-grid">
                                <button type="submit" class="btn btn-danger btn-lg shadow-sm">Entrar</button>
                            </div>
                        </form>
                        
                    </div>
                    
                    <div class="card-footer text-center py-3 bg-white border-0">
                        <small class="text-muted">Não tem conta? <a href="/usuario" class="text-danger">Cadastre-se</a></small>
                    </div>
                </div>

            </div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-HwwvtgBNo3bZJJLYd8oVXjrBZt8cqVSpeBNS5n7C8IVInixGAoxmnlMuBnhbgrkm"
        crossorigin="anonymous"></script>
</body>

</html>
