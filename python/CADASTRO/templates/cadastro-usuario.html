<!doctype html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Criar Conta | SaaS Flask</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #ffffff; font-family: 'Inter', sans-serif; }
        .registration-card { border: none; padding: 2rem; }
        .form-control { border-radius: 8px; border: 1px solid #d1d5db; padding: 0.75rem; }
        .btn-register { background: #111827; color: white; border: none; padding: 0.8rem; border-radius: 8px; transition: 0.3s; }
        .btn-register:hover { background: #374151; }
    </style>
</head>
<body>
    <div class="container py-5">
        <div class="row align-items-center justify-content-center" style="min-height: 80vh;">
            <div class="col-md-6 col-lg-5">
                <div class="registration-card">
                    <h2 class="fw-bold mb-1">Comece agora</h2>
                    <p class="text-muted mb-4">Crie sua conta em menos de um minuto.</p>

                    <form action="/cadastrar-usuario" method="post">
                        <div class="mb-3">
                            <label class="form-label small fw-bold">Nome</label>
                            <input type="text" class="form-control" name="nome" placeholder="Seu nome" required>
                        </div>
                        <div class="row mb-3">
                            <div class="col">
                                <label class="form-label small fw-bold">CPF</label>
                                <input type="text" class="form-control" name="cpf" placeholder="000.000.000-00" required>
                            </div>
                            <div class="col">
                                <label class="form-label small fw-bold">Nascimento</label>
                                <input type="date" class="form-control" name="nascimento" required>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-bold">E-mail</label>
                            <input type="email" class="form-control" name="email" placeholder="voce@exemplo.com" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label small fw-bold">Senha</label>
                            <input type="password" class="form-control" name="senha" placeholder="Mínimo 8 caracteres" required>
                        </div>
                        <button type="submit" class="btn btn-register w-100 fw-bold">Criar minha conta</button>
                    </form>
                    <p class="text-center mt-4 small">Já tem conta? <a href="/login" class="text-primary text-decoration-none fw-bold">Entrar</a></p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
