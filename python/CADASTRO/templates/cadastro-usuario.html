<!doctype html>
<html lang="pt-br">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Cadastro | Projeto Flask</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-4bw+/aepP/YC94hEpVNVgiZdgIC5+VKNBQNGCHeKRQN+PtmoHDEXuppvnDJzQIu9" crossorigin="anonymous">

    <style>
        body { background-color: #f8f9fa; }
        .card { border-radius: 12px; overflow: hidden; }
        .form-label { font-weight: 600; color: #495057; }
        .form-control:focus { border-color: #dc3545; box-shadow: 0 0 0 0.25Refremrem rgba(220, 53, 69, 0.25); }
    </style>
</head>

<body>

    <header>
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
            <div class="container">
                <a class="navbar-brand fw-bold" href="/">PROJETO FLASK</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item">
                            <a class="nav-link active" href="/usuario">Cadastro</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="/login">Login</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <main class="container mt-5 mb-5">
        <section class="row justify-content-center">
            <div class="col-md-10 col-lg-7">
                
                <div class="card border-0 shadow-lg">
                    <div class="card-header bg-danger text-white py-3">
                        <h4 class="mb-0 text-uppercase text-center fw-bold" style="letter-spacing: 1px;">
                            Criar Nova Conta
                        </h4>
                    </div>

                    <div class="card-body p-4 p-md-5">
                        
                        {% set aviso = get_flashed_messages() %}
                        {% if aviso %}
                        <div class="alert alert-warning border-0 shadow-sm text-center mb-4" role="alert">
                            {{ aviso[0] }}
                        </div>
                        {% endif %}

                        <form action="/cadastrar-usuario" method="post">
                            
                            <div class="row">
                                <div class="col-12 mb-3">
                                    <label for="nome" class="form-label">Nome Completo</label>
                                    <input type="text" class="form-control form-control-lg" id="nome" name="nome" placeholder="Ex: João Silva" required>
                                </div>

                                <div class="col-md-6 mb-3">
                                    <label for="nascimento" class="form-label">Data de Nascimento</label>
                                    <input type="date" class="form-control form-control-lg" id="nascimento" name="nascimento" required>
                                </div>

                                <div class="col-md-6 mb-3">
                                    <label for="cpf" class="form-label">CPF</label>
                                    <input type="text" class="form-control form-control-lg" id="cpf" name="cpf" placeholder="000.000.000-00" required>
                                </div>

                                <div class="col-12 mb-3">
                                    <label for="email" class="form-label">E-mail</label>
                                    <input type="email" class="form-control form-control-lg" id="email" name="email" placeholder="nome@exemplo.com" required>
                                </div>

                                <div class="col-12 mb-4">
                                    <label for="senha" class="form-label">Senha</label>
                                    <input type="password" class="form-control form-control-lg" id="senha" name="senha" placeholder="Crie uma senha segura" required>
                                </div>
                            </div>

                            <div class="d-grid gap-2">
                                <button type="submit" class="btn btn-danger btn-lg fw-bold shadow-sm">
                                    Finalizar Cadastro
                                </button>
                                <a href="/login" class="btn btn-link text-muted mt-2">Já possui uma conta? Faça login</a>
                            </div>

                        </form>
                    </div>
                </div>

            </div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-HwwvtgBNo3bZJJLYd8oVXjrBZt8cqVSpeBNS5n7C8IVInixGAoxmnlMuBnhbgrkm"
        crossorigin="anonymous"></script>
</body>

</html>
