<!doctype html>
<html lang="pt-br">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Editar Usuário | Projeto Flask</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-4bw+/aepP/YC94hEpVNVgiZdgIC5+VKNBQNGCHeKRQN+PtmoHDEXuppvnDJzQIu9" crossorigin="anonymous">

    <style>
        body { background-color: #f8f9fa; }
        .card { border-radius: 12px; overflow: hidden; }
        /* Estilo para campo apenas leitura */
        .form-control[readonly] { background-color: #e9ecef; cursor: not-allowed; }
    </style>
</head>

<body>

    <header>
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
            <div class="container">
                <a class="navbar-brand fw-bold" href="/">PROJETO FLASK</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item">
                            <a class="nav-link" href="/listar-usuarios">Listagem</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link btn btn-outline-light btn-sm ms-lg-3 px-3" href="/logout">Sair</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <main class="container mt-5">
        <section class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                
                <div class="card border-0 shadow-lg">
                    <div class="card-header bg-danger text-white py-3">
                        <h5 class="mb-0 text-uppercase text-center fw-bold" style="letter-spacing: 1px;">
                            Editar Cadastro
                        </h5>
                    </div>

                    <div class="card-body p-4">
                        
                        {% set aviso = get_flashed_messages() %}
                        {% if aviso %}
                        <div class="alert alert-info py-2 text-center mb-4" role="alert">
                            <small>{{ aviso[0] }}</small>
                        </div>
                        {% endif %}

                        <form action="/editar-usuario/{{ usuario.cpf }}" method="post">
                            
                            <div class="row">
                                <div class="col-12 mb-3">
                                    <label for="nome" class="form-label fw-semibold">Nome Completo</label>
                                    <input type="text" class="form-control" id="nome" name="nome" 
                                           value="{{ usuario.nome }}" required>
                                </div>

                                <div class="col-md-6 mb-3">
                                    <label for="cpf" class="form-label fw-semibold text-muted">CPF (Não editável)</label>
                                    <input type="text" class="form-control" id="cpf" name="cpf" 
                                           value="{{ usuario.cpf }}" readonly>
                                </div>

                                <div class="col-md-6 mb-3">
                                    <label for="nascimento" class="form-label fw-semibold">Data de Nascimento</label>
                                    <input type="date" class="form-control" id="nascimento" name="nascimento"
                                           value="{{ usuario.nascimento }}">
                                </div>

                                <div class="col-12 mb-4">
                                    <label for="email" class="form-label fw-semibold">E-mail Corporativo</label>
                                    <input type="email" class="form-control" id="email" name="email" 
                                           value="{{ usuario.email }}" required>
                                </div>
                            </div>

                            <div class="d-flex justify-content-between align-items-center border-top pt-4">
                                <a href="/listar-usuarios" class="btn btn-link text-muted text-decoration-none">
                                    &larr; Voltar para lista
                                </a>
                                <button type="submit" class="btn btn-danger px-5 shadow-sm fw-bold">
                                    Salvar Alterações
                                </button>
                            </div>

                        </form>
                    </div>
                </div>

            </div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-HwwvtgBNo3bZJJLYd8oVXjrBZt8cqVSpeBNS5n7C8IVInixGAoxmnlMuBnhbgrkm"
        crossorigin="anonymous"></script>
</body>

</html>
